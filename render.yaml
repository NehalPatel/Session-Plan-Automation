services:
  - type: web
    name: session-plan-api
    runtime: node
    plan: free
    rootDir: apps/api
    buildCommand: cd ../.. && npm run build:api
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
